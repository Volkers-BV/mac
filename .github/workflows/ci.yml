name: ci

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  check:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: brew install shellcheck
      - name: Run shellcheck
        run: shellcheck setup.sh scripts/*.sh
      - name: Validate Brewfile
        run: brew bundle check --file=Brewfile --verbose
